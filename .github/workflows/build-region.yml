name: build-region

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Output filename without extension (e.g. 'lake-district')"
        required: true
        type: string
      bbox:
        description: "minLon,minLat,maxLon,maxLat (decimal degrees)"
        required: true
        type: string
      maxzoom:
        description: "Max zoom level"
        required: true
        default: "13"
        type: choice
        options: ["10", "11", "12", "13", "14"]
      area:
        description: "Geofabrik area to pull OSM data from"
        required: true
        default: "great-britain"
        type: choice
        options:
          - great-britain
          - europe/ireland-and-northern-ireland
          - europe
      description:
        description: "Catalog description (shown in the app)"
        required: false
        type: string
        default: ""

# Single in-flight build at a time so two concurrent dispatches don't
# wedge planetiler's working directory.
concurrency:
  group: build-region
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate inputs
        run: |
          NAME="${{ inputs.name }}"
          BBOX="${{ inputs.bbox }}"
          if ! [[ "$NAME" =~ ^[a-z0-9][a-z0-9._-]{0,63}$ ]]; then
            echo "::error::Name must be 1-64 chars, [a-z0-9._-]; got '$NAME'"
            exit 1
          fi
          IFS=',' read -ra B <<< "$BBOX"
          if [ "${#B[@]}" -ne 4 ]; then
            echo "::error::bbox must be 4 comma-separated numbers; got '$BBOX'"
            exit 1
          fi
          for v in "${B[@]}"; do
            if ! [[ "$v" =~ ^-?[0-9]+(\.[0-9]+)?$ ]]; then
              echo "::error::bbox component '$v' is not a number"
              exit 1
            fi
          done

      - name: Download planetiler
        run: |
          curl -sL -o planetiler.jar \
            https://github.com/onthegomap/planetiler/releases/latest/download/planetiler.jar
          ls -lh planetiler.jar

      - name: Build MBTiles
        run: |
          mkdir -p out
          # -Xmx6g leaves ~1GB headroom on GitHub's 7GB ubuntu-latest
          # runners; the rest stays free for OS + buffers. Larger areas
          # may need to drop maxzoom to fit.
          java -Xmx6g -jar planetiler.jar \
            --area='${{ inputs.area }}' \
            --bounds='${{ inputs.bbox }}' \
            --output='out/${{ inputs.name }}.mbtiles' \
            --maxzoom='${{ inputs.maxzoom }}' \
            --download \
            --force
          ls -lh out/

      - name: Verify output is under the GitHub Release 2 GB cap
        run: |
          SIZE=$(stat -c%s 'out/${{ inputs.name }}.mbtiles')
          echo "MBTiles size: $SIZE bytes ($(($SIZE / 1024 / 1024)) MB)"
          if [ "$SIZE" -gt $((2 * 1024 * 1024 * 1024)) ]; then
            echo "::error::Output exceeds GitHub's 2 GB per-asset limit. Lower the maxzoom or shrink the bbox."
            exit 1
          fi

      - name: Ensure tilesets-v1 release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view tilesets-v1 >/dev/null 2>&1 || gh release create tilesets-v1 \
            --title "Tilesets v1" \
            --notes "Curated MBTiles regions for the in-app catalog. Files here are referenced by docs/tilesets.json."

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload tilesets-v1 'out/${{ inputs.name }}.mbtiles' --clobber

      - name: Update catalog (docs/tilesets.json)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NAME='${{ inputs.name }}'
          DESC='${{ inputs.description }}'
          BBOX='${{ inputs.bbox }}'
          MAXZOOM='${{ inputs.maxzoom }}'
          AREA='${{ inputs.area }}'
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/tilesets-v1/${NAME}.mbtiles"
          SIZE=$(stat -c%s "out/${NAME}.mbtiles")

          # Default description if the user left it empty.
          if [ -z "$DESC" ]; then
            DESC="$AREA · bbox $BBOX · zoom 0–$MAXZOOM"
          fi

          # Atomic replace-or-append on the regions array — tag entries
          # by id so the same name re-runs as an in-place update rather
          # than duplicating.
          python3 - <<PY
          import json, pathlib
          p = pathlib.Path('docs/tilesets.json')
          data = json.loads(p.read_text())
          data.setdefault('regions', [])
          new = {
              'id': '${NAME}',
              'name': '${NAME}',
              'description': '${DESC}',
              'url': '${ASSET_URL}',
              'sizeBytes': ${SIZE},
              'bbox': '${BBOX}',
              'maxzoom': int('${MAXZOOM}'),
              'area': '${AREA}',
          }
          data['regions'] = [r for r in data['regions'] if r.get('id') != new['id']]
          data['regions'].append(new)
          data['regions'].sort(key=lambda r: r.get('id', ''))
          p.write_text(json.dumps(data, indent=2) + '\n')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/tilesets.json
          if git diff --cached --quiet; then
            echo "tilesets.json already up to date"
            exit 0
          fi
          git commit -m "catalog: add/update '${NAME}' (${BBOX}, z0-${MAXZOOM})"
          git push origin HEAD:main
