name: release

on:
  push:
    branches: [main]

env:
  # The SHA-1 the APK MUST be signed with — matches the committed keystore
  # at android/app/debug.keystore. If this value drifts at build time the
  # build fails loudly instead of shipping an unsignable-upgrade APK.
  EXPECTED_SHA1: 67:25:31:A5:72:75:DC:16:F4:F6:6A:14:8F:D7:78:B0:E3:65:C8:EC

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify pinned keystore is present
        # The keystore lives in-tree at android/app/debug.keystore so both
        # local and CI builds sign identically. If it's missing something
        # wiped it and we must not ship — a regenerated keystore would give
        # every user an "upgrade requires uninstall" surprise.
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            echo "::error::android/app/debug.keystore is missing from the checkout."
            exit 1
          fi
          if ! keytool -list -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey > /dev/null 2>&1; then
            echo "::error::Pinned keystore is unreadable with the default password."
            exit 1
          fi
          echo "Pinned keystore fingerprint:"
          keytool -list -v -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey | grep -E 'SHA1:|SHA256:'

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Verify APK is signed with the expected keystore
        # If AGP sidesteps our pinned signingConfig for any reason, the APK's
        # cert SHA-1 will not match EXPECTED_SHA1 and this step fails. That
        # stops us from ever shipping a release that can't upgrade existing
        # installs.
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          APKSIGNER=$(ls -t $ANDROID_HOME/build-tools/*/apksigner 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found in $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER"
          CERTS=$("$APKSIGNER" verify --print-certs "$APK")
          echo "$CERTS"
          ACTUAL=$(echo "$CERTS" | grep -i 'SHA-1 digest' | awk '{print $NF}')
          EXPECTED_COMPACT=$(echo "$EXPECTED_SHA1" | tr -d ':' | tr 'A-F' 'a-f')
          if [ "$ACTUAL" != "$EXPECTED_COMPACT" ]; then
            echo "::error::APK signed with $ACTUAL but expected $EXPECTED_COMPACT — existing installs will reject the upgrade."
            exit 1
          fi
          echo "✓ APK signed with the pinned keystore."

      - name: Get version from pubspec
        id: version
        # Tag and asset names include the build number so every push gets
        # its own release. Using `+` in tags works on GitHub but URL-encodes
        # to `%2B`, which clutters the release URL — so we replace `+` with
        # `-` for the tag (and asset filename), keeping the canonical
        # `0.8.0+31` only inside the human-facing release name and the
        # CHANGELOG. Result:
        #   tag:    v0.8.0-31
        #   name:   v0.8.0+31
        #   asset:  Trail-v0.8.0-31.apk
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$BUILD" >> $GITHUB_OUTPUT
          echo "name=v$VERSION+$BUILD" >> $GITHUB_OUTPUT

      - name: Extract CHANGELOG section for this release
        id: changelog
        # Pull the section between `## [vX.Y.Z+N]` and the next `## ` header
        # so GitHub Releases show the Added/Changed/Fixed notes instead of
        # an empty body. If no matching section is found we fall back to a
        # "see CHANGELOG.md" placeholder rather than failing the build —
        # a missing note shouldn't block an APK ship.
        run: |
          VERSION_PATTERN="${{ steps.version.outputs.version }}+${{ steps.version.outputs.build }}"
          # `index()` + literal-prefix compare avoids the `+` in version
          # strings being interpreted as a regex quantifier.
          awk -v prefix="## [$VERSION_PATTERN]" '
            index($0, prefix) == 1 {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry for $VERSION_PATTERN — falling back to placeholder." >&2
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes." > release_notes.md
          fi
          echo "---- release notes body ----"
          cat release_notes.md
          echo "---- end ----"

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Trail-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: release_notes.md
          files: build/app/outputs/flutter-apk/Trail-${{ steps.version.outputs.tag }}.apk
          fail_on_unmatched_files: true
